services:
  xserver-renew:
    image: debug502/xserver-vps-renew:latest
    container_name: xserver-vps-renew
    env_file: .env
    environment:
      - TZ=Asia/Tokyo
      # 定时规则，在 .env 中通过 CRON_SCHEDULE 配置
      # 默认：0 23 * * *（东京时间 08:00）
    volumes:
      # 持久化 Chrome 用户数据（保留登录 Cookie，减少重复登录）
      - chrome-data:/data/chrome-profile
    # Chrome 渲染需要较大共享内存
    shm_size: "2gb"
    restart: unless-stopped

volumes:
  chrome-data:
