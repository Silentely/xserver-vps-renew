services:
  xserver-renew:
    image: cosrbackup/xserver-vps-renew:latest
    container_name: xserver-vps-renew
    env_file: .env
    environment:
      - TZ=Asia/Tokyo
      # 每天 UTC 23:00（东京时间 08:00）执行，可通过 .env 中 CRON_SCHEDULE 覆盖
      - CRON_SCHEDULE=0 23 * * *
    volumes:
      # 持久化 Chrome 用户数据（保留登录 Cookie，减少重复登录）
      - chrome-data:/data/chrome-profile
    # Chrome 渲染需要较大共享内存
    shm_size: "2gb"
    restart: unless-stopped

volumes:
  chrome-data:
