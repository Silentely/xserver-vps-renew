services:
  xserver-renew:
    image: ghcr.io/silentely/xserver-vps-renew:latest
    container_name: xserver-vps-renew
    env_file: .env
    environment:
      - TZ=Asia/Tokyo
      - CRON_SCHEDULE=0 23 * * *
      # 与 Chrome 用户数据同卷持久化，避免重启后丢失续期历史
      - RENEWAL_STATUS_FILE=/data/chrome-profile/renewal-status.json
    volumes:
      - chrome-data:/data/chrome-profile
    shm_size: "2gb"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # 定时模式看 supercronic；执行中看主脚本进程
      test: ["CMD-SHELL", "pgrep -f supercronic >/dev/null || pgrep -f 'xserver-vps-renew' >/dev/null || exit 1"]
      interval: 30m
      timeout: 10s
      retries: 3

volumes:
  chrome-data:
