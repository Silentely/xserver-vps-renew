name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare image name (lowercase)
        id: prep
        run: echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Install dependencies
        run: npm ci

      - name: Validate scripts
        run: |
          node --check xserver-vps-renew.mjs
          bash -n entrypoint.sh
          bash -n diagnostics.sh

      - name: Shellcheck static analysis
        run: |
          sudo apt-get update -qq && sudo apt-get install -qq -y shellcheck
          shellcheck -S warning entrypoint.sh diagnostics.sh

      - name: Run unit tests
        run: npm test

      - name: Run tests with coverage gate
        run: npm run test:coverage

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image_name }}:latest
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Cleanup old workflow runs (retain 5 days)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y && sudo apt-get install -y jq
          fi
          repo="$GITHUB_REPOSITORY"
          base="https://api.github.com/repos/$repo"
          cutoff=$(( $(date +%s) - 5*24*3600 ))
          page=1
          while :; do
            runs=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$base/actions/runs?per_page=100&page=$page")
            count=$(echo "$runs" | jq '.workflow_runs | length')
            [ "$count" -gt 0 ] || break
            echo "$runs" | jq -r \
              --argjson cutoff "$cutoff" \
              '.workflow_runs[] | select(.status=="completed") | select((.created_at | fromdateiso8601) < $cutoff) | .id' \
              | while read -r id; do
                  echo "Deleting run $id"
                  curl -sS -X DELETE -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$base/actions/runs/$id" -o /dev/null -w "%{http_code}\n" | grep -E "^(204|404)$" >/dev/null || true
                done
            page=$((page+1))
          done
